# Stack complète du portfolio — à déployer sur le NAS.
# Démarrage :
#   1. cp .env.example .env  (puis remplir .env)
#   2. docker compose up -d --build
#   3. (1re fois) docker compose run --rm api npm run migrate
# Le service `web` (Nginx) sert le SPA et proxy /api → `api` (même origine).
# Brancher le reverse proxy + HTTPS d'UGOS sur ${WEB_PORT}.
services:
  postgres:
    image: postgres:17-alpine
    container_name: portfolio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Aucun port publié : Postgres n'est joignable que par l'API via le réseau Docker
    # interne. (Pour un accès admin ponctuel : `docker compose exec postgres psql ...`.)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: portfolio-ntfy
    command: serve
    restart: unless-stopped
    environment:
      NTFY_BASE_URL: ${NTFY_BASE_URL}
      NTFY_CACHE_FILE: /var/cache/ntfy/cache.db
      NTFY_CACHE_DURATION: "12h"
      # Relais APNs pour les notifs push iOS (app fermée).
      # Seul un "réveil" anonyme passe par ntfy.sh ; le message reste sur le NAS.
      NTFY_UPSTREAM_BASE_URL: https://ntfy.sh
      # Auth : tout est refusé par défaut. On crée un user + token (write) pour l'API
      # et on connecte l'appli du tél avec ce compte (read). Base persistée dans le volume.
      NTFY_AUTH_FILE: /var/cache/ntfy/user.db
      NTFY_AUTH_DEFAULT_ACCESS: deny-all
    ports:
      - "8080:80"
    volumes:
      - ntfy_data:/var/cache/ntfy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- API Fastify (containerisée). Aucun port hôte : joignable seulement via `web`. ---
  api:
    build:
      context: ../backend
      # réseau hôte pendant le build : les RUN (npm ci) sont sinon droppés par
      # le pare-feu UGOS en « Accès refusé » (même piège que caddy-ratelimit)
      network: host
    container_name: portfolio-api
    restart: unless-stopped
    environment:
      PORT: 3001
      HOST: 0.0.0.0
      # Postgres via le réseau interne (nom de service), pas le port 55432 du LAN
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NTFY_URL: http://ntfy:80
      NTFY_TOPIC: ${NTFY_TOPIC}
      NTFY_TOKEN: ${NTFY_TOKEN:-} # token de publication ntfy (auth activée)
      TURNSTILE_SECRET: ${TURNSTILE_SECRET:-} # secret anti-bot Cloudflare Turnstile
      CORS_ORIGIN: ${SITE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      ntfy:
        condition: service_started
    healthcheck:
      # 127.0.0.1 (pas localhost) : dans le conteneur, localhost résout d'abord en
      # IPv6 ::1, or l'API n'écoute qu'en IPv4 → "connection refused" au healthcheck.
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Outil admin/CRM interne. Port 8100 = LAN/VPN uniquement (jamais NATé,
  # pas de bloc Caddy) : suivi des messages du formulaire + explorateur BDD. ---
  admin:
    build:
      context: ../admin
      # réseau hôte pendant le build : les RUN (npm ci) sont sinon droppés par
      # le pare-feu UGOS en « Accès refusé » (même piège que caddy-ratelimit)
      network: host
    container_name: portfolio-admin
    restart: unless-stopped
    environment:
      PORT: 3002
      HOST: 0.0.0.0
      # user PostgreSQL dédié aux droits limités (SELECT partout, écriture
      # uniquement sur contacts) — créé une fois via psql, cf. .env.example
      DATABASE_URL_ADMIN: postgres://${ADMIN_DB_USER}:${ADMIN_DB_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ADMIN_PASSWORD_HASH: ${ADMIN_PASSWORD_HASH}
      SESSION_SECRET: ${ADMIN_SESSION_SECRET}
    ports:
      - "8100:3002"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3002/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Frontend : Nginx sert dist/ et proxy /api → api (même origine, zéro CORS). ---
  web:
    build:
      context: ../frontend
      network: host
    container_name: portfolio-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    # Aucun port publié : seul `caddy` (8081/8443) est l'entrée publique → il
    # joint `web` via le réseau Docker interne. (Plus d'accès LAN direct en 8088.)

  # --- Reverse proxy public + HTTPS auto (Let's Encrypt). Seule entrée 80/443. ---
  caddy:
    image: caddy:2-alpine
    container_name: portfolio-caddy
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      # 80/443 du NAS sont pris par le nginx système d'UGOS, et 8080 par ntfy →
      # on écoute sur 8081/8443 ; la box redirige le 80/443 public vers eux (NAT).
      - "8081:80"
      - "8443:443"
      - "8443:443/udp" # HTTP/3 (QUIC)
    # NB : sur la machine de déploiement, un docker-compose.override.yml LOCAL
    # (non versionné, chargé automatiquement) peut enrichir ce service :
    # image Caddy avec plugins + réseaux d'autres stacks pour les blocs conf.d/.
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./conf.d:/etc/caddy/conf.d:ro # blocs locaux importés (gitignorés)
      - caddy_data:/data # certificats Let's Encrypt — À PERSISTER (rate-limit ACME)
      - caddy_config:/config

volumes:
  postgres_data:
  ntfy_data:
  caddy_data:
  caddy_config:
