# Stack complète du portfolio — à déployer sur le NAS.
# Démarrage :
#   1. cp .env.example .env  (puis remplir .env)
#   2. docker compose up -d --build
#   3. (1re fois) docker compose run --rm api npm run migrate
# Le service `web` (Nginx) sert le SPA et proxy /api → `api` (même origine).
# Brancher le reverse proxy + HTTPS d'UGOS sur ${WEB_PORT}.
services:
  postgres:
    image: postgres:17-alpine
    container_name: portfolio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # host 55432 (5432 ET 5433 sont déjà pris sur le NAS par UGOS) → conteneur 5432.
      # exposé sur le LAN pour que l'API de dev (PC) s'y connecte.
      # En prod, l'API tournera sur le NAS et parlera à Postgres via le réseau interne.
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: portfolio-ntfy
    command: serve
    restart: unless-stopped
    environment:
      NTFY_BASE_URL: ${NTFY_BASE_URL}
      NTFY_CACHE_FILE: /var/cache/ntfy/cache.db
      NTFY_CACHE_DURATION: "12h"
      # Relais APNs pour les notifs push iOS (app fermée).
      # Seul un "réveil" anonyme passe par ntfy.sh ; le message reste sur le NAS.
      NTFY_UPSTREAM_BASE_URL: https://ntfy.sh
    ports:
      - "8080:80"
    volumes:
      - ntfy_data:/var/cache/ntfy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/v1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- API Fastify (containerisée). Aucun port hôte : joignable seulement via `web`. ---
  api:
    build: ../backend
    container_name: portfolio-api
    restart: unless-stopped
    environment:
      PORT: 3001
      HOST: 0.0.0.0
      # Postgres via le réseau interne (nom de service), pas le port 55432 du LAN
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NTFY_URL: http://ntfy:80
      NTFY_TOPIC: ${NTFY_TOPIC}
      CORS_ORIGIN: ${SITE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      ntfy:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Frontend : Nginx sert dist/ et proxy /api → api (même origine, zéro CORS). ---
  web:
    build: ../frontend
    container_name: portfolio-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      # exposé sur le LAN ; le reverse proxy + HTTPS d'UGOS pointera ici
      - "${WEB_PORT:-8088}:80"

volumes:
  postgres_data:
  ntfy_data:
