<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, 'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1a" /><stop offset="1" stop-color="#141b2b" />
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0" r="0.8">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.14" /><stop offset="1" stop-color="#2dd4bf" stop-opacity="0" />
    </radialGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000000" flood-opacity="0.45" />
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)" />
  <rect width="1200" height="420" fill="url(#glow)" />

  <!-- fenêtre terminal -->
  <g filter="url(#sh)">
    <rect x="88" y="64" width="1024" height="548" rx="14" fill="#0d1320" stroke="#232a3a" />
  </g>
  <!-- barre de titre -->
  <circle cx="118" cy="86" r="5.5" fill="#f87171" /><circle cx="138" cy="86" r="5.5" fill="#fbbf24" /><circle cx="158" cy="86" r="5.5" fill="#34d399" />
  <text x="600" y="91" font-size="13" fill="#6b7689" text-anchor="middle">alexis@homelab : ~/lab</text>
  <line x1="88" y1="108" x2="1112" y2="108" stroke="#1c2433" />

  <!-- corps -->
  <g font-size="17">
    <!-- bloc serveurs de jeux -->
    <text x="120" y="146"><tspan fill="#2dd4bf">alexis@homelab:~$</tspan><tspan fill="#e6edf3"> docker compose ps</tspan></text>
    <text x="120" y="173" fill="#6b7689">NAME</text><text x="380" y="173" fill="#6b7689">STATUS</text><text x="600" y="173" fill="#6b7689">PORTS</text>
    <text x="120" y="200" fill="#7aa2f7">minecraft-server</text><text x="380" y="200" fill="#4ade80">Up 6 days</text><text x="600" y="200" fill="#8b98a5">25565/tcp</text>
    <text x="120" y="227" fill="#7aa2f7">skyrim-server</text><text x="380" y="227" fill="#4ade80">Up 3 days</text><text x="600" y="227" fill="#8b98a5">10578/udp</text>
    <text x="120" y="254" fill="#7aa2f7">subnautica-server</text><text x="380" y="254" fill="#4ade80">Up 12 hours</text><text x="600" y="254" fill="#8b98a5">11000/udp</text>

    <!-- bloc lab DevOps -->
    <text x="120" y="308"><tspan fill="#2dd4bf">alexis@homelab:~$</tspan><tspan fill="#e6edf3"> kubectl get nodes</tspan></text>
    <text x="120" y="335" fill="#6b7689">NAME</text><text x="320" y="335" fill="#6b7689">STATUS</text><text x="470" y="335" fill="#6b7689">ROLES</text><text x="720" y="335" fill="#6b7689">AGE</text>
    <text x="120" y="362" fill="#e6edf3">lab-cp1</text><text x="320" y="362" fill="#4ade80">Ready</text><text x="470" y="362" fill="#8b98a5">control-plane</text><text x="720" y="362" fill="#8b98a5">14d</text>
    <text x="120" y="389" fill="#e6edf3">lab-w1</text><text x="320" y="389" fill="#4ade80">Ready</text><text x="470" y="389" fill="#8b98a5">worker</text><text x="720" y="389" fill="#8b98a5">14d</text>
    <text x="120" y="416" fill="#e6edf3">lab-w2</text><text x="320" y="416" fill="#4ade80">Ready</text><text x="470" y="416" fill="#8b98a5">worker</text><text x="720" y="416" fill="#8b98a5">14d</text>

    <text x="120" y="470"><tspan fill="#2dd4bf">alexis@homelab:~$</tspan><tspan fill="#e6edf3"> terraform apply -auto-approve</tspan></text>
    <text x="120" y="497" fill="#4ade80">Apply complete! Resources: 3 added, 0 changed.</text>

    <text x="120" y="524"><tspan fill="#2dd4bf">alexis@homelab:~$</tspan><tspan fill="#e6edf3"> ansible-playbook site.yml</tspan></text>
    <text x="120" y="551"><tspan fill="#8b98a5">PLAY RECAP   </tspan><tspan fill="#4ade80">ok=18  </tspan><tspan fill="#fbbf24">changed=4  </tspan><tspan fill="#4ade80">failed=0</tspan></text>

    <text x="120" y="578"><tspan fill="#2dd4bf">alexis@homelab:~$</tspan></text>
    <rect x="285" y="565" width="10" height="18" fill="#2dd4bf" />
  </g>
</svg>
