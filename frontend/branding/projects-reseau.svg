<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.4" fill="#d3d8e0" /></pattern>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1f2937" flood-opacity="0.12" /></filter>
  </defs>
  <rect width="1200" height="675" fill="#eef1f5" /><rect width="1200" height="675" fill="url(#dots)" />
  <text x="60" y="56" font-size="15" fill="#6b7280" font-weight="bold">Réseau domestique — segmentation &amp; sécurité</text>

  <!-- liaisons coeur -->
  <g stroke="#aab2c0" stroke-width="2" fill="none">
    <path d="M620 130 L620 168" />
    <path d="M620 244 L620 296" />
    <path d="M620 360 L225 436" />
    <path d="M620 360 L475 436" />
    <path d="M620 360 L725 436" />
    <path d="M620 360 L975 436" />
  </g>
  <!-- lien 10 GbE (switch -> serveurs) plus épais -->
  <path d="M620 360 L225 436" stroke="#0f766e" stroke-width="4" fill="none" opacity="0.9" />
  <rect x="356" y="384" width="74" height="22" rx="11" fill="#ccfbf1" /><text x="393" y="399" font-size="11" font-weight="bold" fill="#0f766e" text-anchor="middle">10 GbE</text>

  <!-- VPN -->
  <path d="M720 205 L980 130" stroke="#14b8a6" stroke-width="2.5" stroke-dasharray="7 6" fill="none" />
  <rect x="828" y="150" width="120" height="22" rx="11" fill="#ccfbf1" /><text x="888" y="165" font-size="11" font-weight="bold" fill="#0f766e" text-anchor="middle">WireGuard</text>

  <!-- iSCSI entre Serveurs et Postes -->
  <path d="M325 545 C 350 580, 450 580, 475 545" stroke="#2563eb" stroke-width="2" stroke-dasharray="6 5" fill="none" />
  <rect x="358" y="566" width="84" height="20" rx="10" fill="#dbeafe" /><text x="400" y="580" font-size="10" font-weight="bold" fill="#1d4ed8" text-anchor="middle">iSCSI</text>

  <!-- Internet -->
  <g filter="url(#sh)"><rect x="540" y="74" width="160" height="56" rx="12" fill="#ffffff" stroke="#d4d9e2" /></g>
  <circle cx="570" cy="102" r="13" fill="none" stroke="#0f766e" stroke-width="2" /><ellipse cx="570" cy="102" rx="5.5" ry="13" fill="none" stroke="#0f766e" stroke-width="2" /><line x1="557" y1="102" x2="583" y2="102" stroke="#0f766e" stroke-width="2" />
  <text x="594" y="107" font-size="14" font-weight="bold" fill="#1f2937">Internet</text>

  <!-- Routeur / pare-feu -->
  <g filter="url(#sh)"><rect x="500" y="168" width="240" height="76" rx="12" fill="#ffffff" stroke="#d4d9e2" /></g>
  <rect x="522" y="190" width="30" height="22" rx="3" fill="#0f766e" /><path d="M528 190 v-8 M540 190 v-12" stroke="#0f766e" stroke-width="2" />
  <text x="566" y="200" font-size="14" font-weight="bold" fill="#1f2937">Box / Pare-feu</text>
  <text x="566" y="220" font-size="11" fill="#8a90a0">DNS · iptables · NAT</text>

  <!-- Accès distant -->
  <g filter="url(#sh)"><rect x="980" y="100" width="172" height="60" rx="12" fill="#ffffff" stroke="#14b8a6" /></g>
  <rect x="1002" y="122" width="16" height="14" rx="2" fill="none" stroke="#0f766e" stroke-width="2" /><path d="M1005 122 v-4 a5 5 0 0 1 10 0 v4" fill="none" stroke="#0f766e" stroke-width="2" />
  <text x="1028" y="126" font-size="12.5" font-weight="bold" fill="#1f2937">Accès distant</text><text x="1028" y="143" font-size="10" fill="#8a90a0">VPN chiffré</text>

  <!-- Switch -->
  <g filter="url(#sh)"><rect x="500" y="296" width="240" height="64" rx="12" fill="#1f2937" /></g>
  <g fill="#4b5563"><rect x="520" y="332" width="20" height="12" rx="2" /><rect x="546" y="332" width="20" height="12" rx="2" /><rect x="572" y="332" width="20" height="12" rx="2" /><rect x="598" y="332" width="20" height="12" rx="2" /><rect x="624" y="332" width="20" height="12" rx="2" /><rect x="650" y="332" width="20" height="12" rx="2" /><rect x="676" y="332" width="20" height="12" rx="2" /><rect x="702" y="332" width="20" height="12" rx="2" /></g>
  <text x="620" y="322" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Switch manageable · 10 GbE</text>

  <!-- VLAN boxes -->
  <!-- VLAN 10 Serveurs -->
  <g filter="url(#sh)"><rect x="125" y="436" width="200" height="120" rx="12" fill="#ffffff" stroke="#d4d9e2" /></g>
  <rect x="141" y="452" width="74" height="22" rx="11" fill="#0f766e" /><text x="178" y="467" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">VLAN 10</text>
  <text x="141" y="498" font-size="14" font-weight="bold" fill="#1f2937">Serveurs</text>
  <text x="141" y="518" font-size="11" fill="#8a90a0">NAS · Postgres · ntfy</text>
  <text x="141" y="538" font-size="11" fill="#8a90a0">jeux · stockage</text>

  <!-- VLAN 20 Postes -->
  <g filter="url(#sh)"><rect x="375" y="436" width="200" height="120" rx="12" fill="#ffffff" stroke="#d4d9e2" /></g>
  <rect x="391" y="452" width="74" height="22" rx="11" fill="#2563eb" /><text x="428" y="467" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">VLAN 20</text>
  <text x="391" y="498" font-size="14" font-weight="bold" fill="#1f2937">Postes</text>
  <text x="391" y="518" font-size="11" fill="#8a90a0">PC / dev</text>
  <text x="391" y="538" font-size="11" fill="#8a90a0">stations de travail</text>

  <!-- VLAN 30 IoT -->
  <g filter="url(#sh)"><rect x="625" y="436" width="200" height="120" rx="12" fill="#ffffff" stroke="#d4d9e2" /></g>
  <rect x="641" y="452" width="74" height="22" rx="11" fill="#d97706" /><text x="678" y="467" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">VLAN 30</text>
  <text x="641" y="498" font-size="14" font-weight="bold" fill="#1f2937">IoT / Domotique</text>
  <text x="641" y="518" font-size="11" fill="#8a90a0">objets connectés</text>
  <text x="641" y="538" font-size="11" fill="#8a90a0">isolés du LAN</text>

  <!-- VLAN 40 Invités -->
  <g filter="url(#sh)"><rect x="875" y="436" width="200" height="120" rx="12" fill="#ffffff" stroke="#d4d9e2" /></g>
  <rect x="891" y="452" width="74" height="22" rx="11" fill="#7c3aed" /><text x="928" y="467" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">VLAN 40</text>
  <text x="891" y="498" font-size="14" font-weight="bold" fill="#1f2937">Invités / Wi-Fi</text>
  <text x="891" y="518" font-size="11" fill="#8a90a0">accès limité</text>
  <text x="891" y="538" font-size="11" fill="#8a90a0">sans accès interne</text>
</svg>
