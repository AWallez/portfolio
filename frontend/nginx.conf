server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # compression à la volée (les assets sont déjà petits ; brotli nécessiterait
  # un build nginx custom — gzip suffit largement ici)
  gzip on;
  # IMPORTANT : derrière Caddy (reverse proxy), gzip_proxied vaut `off` par défaut
  # → Nginx ne compresse PAS les requêtes proxifiées. `any` force la compression
  # quelle que soit la provenance (Caddy laisse ensuite passer la réponse gzip).
  gzip_proxied any;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain text/css application/javascript application/json
    image/svg+xml application/manifest+json application/xml;

  # En-têtes de sécurité : centralisés dans le Caddyfile (infra/Caddyfile).
  # Ils étaient posés ici, mais un add_header dans un location (cache des
  # assets, no-store d'index.html) annule ceux hérités du bloc server →
  # certaines réponses partaient sans en-têtes. Un seul endroit = pas de piège.

  # API → backend, MÊME ORIGINE (donc aucun CORS pour le navigateur)
  location /api/ {
    proxy_pass http://api:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # assets hashés par Vite (JS/CSS/fonts) → cache long immuable
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # point d'entrée : jamais mis en cache → récupère toujours les nouveaux hashes
  location = /index.html {
    add_header Cache-Control "no-store";
  }

  # CV (PDF + SVG, non versionnés dans le nom) : no-cache = le navigateur
  # revalide à chaque visite (304 si inchangé) → une mise à jour du CV est
  # visible immédiatement, sans vider le cache
  location ~* ^/cv-.*\.(pdf|svg)$ {
    add_header Cache-Control "no-cache";
  }

  # SPA : toute route inconnue retombe sur index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
