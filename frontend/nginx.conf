server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # compression à la volée (les assets sont déjà petits ; brotli nécessiterait
  # un build nginx custom — gzip suffit largement ici)
  gzip on;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain text/css application/javascript application/json
    image/svg+xml application/manifest+json application/xml;

  # en-têtes de sécurité de base (CSP volontairement omise : le script anti-flash
  # inline du <head> la rendrait fragile ; à ajouter via le reverse proxy si besoin)
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # API → backend, MÊME ORIGINE (donc aucun CORS pour le navigateur)
  location /api/ {
    proxy_pass http://api:3001;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # assets hashés par Vite (JS/CSS/fonts) → cache long immuable
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  # point d'entrée : jamais mis en cache → récupère toujours les nouveaux hashes
  location = /index.html {
    add_header Cache-Control "no-store";
  }

  # SPA : toute route inconnue retombe sur index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
