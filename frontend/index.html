<!doctype html>
<html lang="fr">
  <head>
    <!-- Anti-flash : applique le thème avant le rendu (évite le clignotement) -->
    <script>
      (function () {
        const t =
          localStorage.theme ??
          (matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light");
        if (t === "dark") document.documentElement.classList.add("dark");
      })();
    </script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    />
    <meta name="author" content="Alexis Wallez" />

    />

      name="theme-color"
      media="(prefers-color-scheme: dark)"
